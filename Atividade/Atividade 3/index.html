<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comentários da Rede Social</title>
  </head>
<body>

  <div class="container">
    <h2>Escreva um Comentário</h2>

    <textarea 
      id="comentario" 
      maxlength="200"
      placeholder="Digite seu comentário..."
    ></textarea>

    <div class="contador">
      Restam <span id="restantes">200</span> caracteres
    </div>
  </div>
  </body>
  </html>
