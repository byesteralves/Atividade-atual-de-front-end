<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <title>Cadastro de Usuários</title>
  </head>
<body>

    <h1>Cadastro de Usuário</h1>

    <label for="senha">Digite sua senha</label>

      id="senha"

      Digite uma senha
    </div>

  </div>
  </body>
