<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Luminosidade Inteligente</title>
  </head>
<body>

  <div class="container">

    <h1>Controle de Luminosidade</h1>

    <!-- Lâmpada -->
    <div class="lampada" id="lampada"></div>

    <!-- Controle -->
    <input 
      type="range" 
      id="controle"
      min="0"
      max="100"
      value="100"
    >

    <div class="valor">
      Intensidade: <span id="porcentagem">100</span>%
    </div>

  </div>
  </body>
  </html>
