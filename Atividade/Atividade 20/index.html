<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player de Música</title>
  </head>
<body>

  <div class="container">

    <h1>Player de Música</h1>

    <audio id="audio" src="https://www.youtube.com/watch?v=k6jqx9kZgPM&list=RDk6jqx9kZgPM&start_radio=1"></audio>

    <div class="botoes">
      <button class="play" id="play">Play</button>
      <button class="pause" id="pause">Pause</button>
    </div>

    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">

    <div class="volume">
      Controle de volume
    </div>

  </div>
